name: nix flake update

# flake input (nixpkgs / nix-claude-code / deno) を更新し、ビルド検証のうえ
# 直接 main へコミットする。適用 (deno task switch) はローカルで行う。

on:
  schedule:
    - cron: "0 6 * * 1" # 毎週月曜 06:00 UTC (15:00 JST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Update flake inputs
        run: deno task upgrade

      - name: Stage and detect changes
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # 壊れた変更を main に流さないため build を gate にする。失敗で job が止まり commit は skip。
      - name: Verify build
        if: steps.diff.outputs.changed == 'true'
        run: nix build ./.config/nix#packages.x86_64-linux.default --impure --no-link --print-build-logs

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: flake input を更新"
          git push origin HEAD:main
